name: test
on: push
jobs:
  test-linux-arm64:
    runs-on: ubuntu-22.04-arm
    container:
      image: alpine:latest
    steps:
      - name: deps
        run: apk add git make basu-dev cmake automake libtool ruby wget clang alsa-lib-dev eudev-dev jack-dev libdecor-dev libsamplerate-dev libusb-dev libx11-dev libxcursor-dev libxext-dev libxi-dev libxkbcommon-dev libxrandr-dev libxrender-dev libxscrnsaver-dev libxtst-dev pipewire-dev pulseaudio-dev samurai wayland-dev wayland-protocols mesa-dev
      - uses: laverdet/alpine-arm64@v1
      - uses: actions/checkout@v5
      - uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: 'skinnyjames/mruby-bin-barista'
          version: 'tags/0.3.1'
          file: 'barista-linux-arm64.tar.gz'
          target: 'barista.tar.gz'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: unpack barista
        run: tar -xvf barista.tar.gz --strip-components 1
      - name: gem install rake
        run: gem install rake
      - name: build pocket
        run: chmod 755 barista && ./barista cli,raylib,nfd,hokusai:http=true:remote=true:arm64=true:platform=sdl:opengl=es mruby:gem_config=./gems
        env:
          LDFLAGS: "-lbasu"
          LIBS: "-lbasu"
      - uses: actions/upload-artifact@v4
        with:
          name: hokusai-pocket-linux-test-arm64
          path: bin/hokusai-pocket
          overwrite: true